- name: create ec2 and route 53 records
  hosts: local
  connection: local
  vars:
    sg_id: sg-0a3d6accff7702558
    ami_id: ami-0220d79f3f480ecf5
    env: dev
    instances: 
    - mongodb
    - catalogue
  tasks: 
  - name: create ec2 instance
    amazon.aws.ec2-instance:
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      name: "{{ item }}-{{ env }}"
      tags: 
        Project: roboshop
        Component: "{{ item }}"
        Environment: "{{ env }}"
        Name: "{{ item }}-{{ env }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: print the output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"